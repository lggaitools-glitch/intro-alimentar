<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
    position: relative;
  }
  /* Scene styles */
  .scene-hook {
    background: linear-gradient(145deg, #4ade80, #16a34a);
    color: white;
  }
  .scene-info {
    background: linear-gradient(145deg, #fef9c3, #fef3c7);
    color: #1a1a1a;
  }
  .scene-check {
    background: linear-gradient(145deg, #f0fdf4, #dcfce7);
    color: #1a1a1a;
  }
  .scene-cta {
    background: linear-gradient(145deg, #4ade80, #16a34a);
    color: white;
  }
  /* Typography */
  .emoji-big { font-size: 120px; margin-bottom: 40px; }
  .title { font-size: 72px; font-weight: 800; line-height: 1.2; margin-bottom: 30px; }
  .subtitle { font-size: 42px; font-weight: 500; line-height: 1.5; opacity: 0.9; }
  .check-item {
    font-size: 48px;
    font-weight: 600;
    text-align: left;
    margin: 20px 0;
    padding: 30px 40px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 100%;
  }
  .check-emoji { font-size: 56px; margin-right: 16px; }
  .badge {
    position: absolute;
    top: 60px;
    left: 80px;
    font-size: 36px;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 12px 28px;
    border-radius: 50px;
  }
  .logo {
    position: absolute;
    bottom: 80px;
    font-size: 32px;
    font-weight: 600;
    opacity: 0.7;
  }
  .brand-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 600;
  }
  .highlight {
    background: rgba(255,255,255,0.25);
    padding: 8px 20px;
    border-radius: 16px;
    display: inline-block;
    margin-top: 16px;
  }
  .number {
    font-size: 200px;
    font-weight: 900;
    opacity: 0.15;
    position: absolute;
    top: 120px;
    right: 80px;
  }
</style>
</head>
<body>
<!-- This is a template reference. Actual slides are generated individually. -->
</body>
</html>
